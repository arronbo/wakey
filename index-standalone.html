<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>夢遊 Wakey — 社交鬧鐘 App</title>

<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.0.0/dist/index.global.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="styles.css"/>

<style>
  html, body { margin: 0; padding: 0; background: #14112A; min-height: 100vh; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: #3B2A4A;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px 0;
    background:
      radial-gradient(ellipse at 30% 20%, #2E2557 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, #3A2F5A 0%, transparent 55%),
      #14112A;
  }
  #root { display: flex; justify-content: center; }
</style>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#2A2240">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="bg" cx="50%" cy="35%" r="65%">
        <stop offset="0%" stop-color="#4A3A6B"/>
        <stop offset="100%" stop-color="#2A2240"/>
      </radialGradient>
      <radialGradient id="moon" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="#FFE9A8"/>
        <stop offset="100%" stop-color="#FFC857"/>
      </radialGradient>
    </defs>
    <rect width="1200" height="800" fill="url(#bg)"/>
    <!-- twinkly stars -->
    <circle cx="200" cy="180" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="320" cy="120" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="950" cy="160" r="5" fill="#fff" opacity="0.9"/>
    <circle cx="1080" cy="240" r="3" fill="#fff" opacity="0.7"/>
    <circle cx="150" cy="320" r="3" fill="#fff" opacity="0.6"/>
    <circle cx="1050" cy="360" r="4" fill="#fff" opacity="0.8"/>
    <!-- moon -->
    <circle cx="900" cy="250" r="70" fill="url(#moon)"/>
    <circle cx="930" cy="225" r="62" fill="#2A2240"/>
    <!-- big bell -->
    <g transform="translate(600 400)">
      <path d="M -140 80 C -140 -60, -90 -120, 0 -130 C 90 -120, 140 -60, 140 80 L 160 80 L 160 110 L -160 110 L -160 80 Z"
            fill="#FF8A6B" stroke="#3B2A4A" stroke-width="6"/>
      <ellipse cx="0" cy="145" rx="22" ry="28" fill="#FF8A6B" stroke="#3B2A4A" stroke-width="6"/>
      <circle cx="0" cy="-130" r="14" fill="#FFC857" stroke="#3B2A4A" stroke-width="5"/>
      <!-- highlight -->
      <path d="M -90 -40 C -100 -70, -70 -100, -30 -100" stroke="#fff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.55"/>
    </g>
    <!-- Z's -->
    <text x="780" y="280" font-family="system-ui" font-size="60" font-weight="700" fill="#fff" opacity="0.85">z</text>
    <text x="810" y="220" font-family="system-ui" font-size="80" font-weight="800" fill="#fff" opacity="0.95">Z</text>
    <text x="850" y="150" font-family="system-ui" font-size="100" font-weight="800" fill="#fff">Z</text>
    <!-- caption -->
    <text x="600" y="650" text-anchor="middle" font-family="system-ui" font-size="46" font-weight="700" fill="#fff" opacity="0.92">夢遊 Wakey</text>
    <text x="600" y="700" text-anchor="middle" font-family="system-ui" font-size="22" font-weight="500" fill="#fff" opacity="0.7">社交鬧鐘 App · 載入中…</text>
  </svg>
</template>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="scenes.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="home-world.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
